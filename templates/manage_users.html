{% extends "base.html" %}
{% block content %}
<h1>Manage Users</h1>
<table class="table">
  <tr><th>ID</th><th>Username</th><th>Email</th><th>Role</th><th>Actions</th></tr>
  {% for user in users %}
  <tr>
    <td>{{ user.id }}</td>
    <td>{{ user.username }}</td>
    <td>{{ user.email }}</td>
    <td>{{ user.role }}</td>
    <td>
      <a href="{{ url_for('user_profile', user_id=user.id) }}" class="btn btn-primary">Edit</a>
    </td>
  </tr>
  {% endfor %}
</table>
{% endblock %}
