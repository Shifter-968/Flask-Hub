{% extends "base.html" %}
{% block content %}
<h1>Manage Schools</h1>

<!-- Add School Form -->
<form method="POST" class="mb-4">
  <div class="mb-3">
    <label>School Name</label>
    <input type="text" name="name" class="form-control" required>
  </div>
  <div class="mb-3">
    <label>Location</label>
    <input type="text" name="location" class="form-control" required>
  </div>
  <div class="mb-3">
    <label>Type</label>
    <select name="school_type" class="form-select" required>
      <option value="pre_school">Pre-School</option>
      <option value="primary_school">Primary School</option>
      <option value="high_school">High School</option>
      <option value="tertiary">Tertiary Institution</option>
    </select>
  </div>
  <button type="submit" class="btn btn-success">Add School</button>
</form>

<!-- Schools Table -->
<table class="table table-hover">
  <tr><th>Name</th><th>Location</th><th>Type</th><th></th></tr>
  {% for school in schools %}
  <tr onclick="window.location='{{ url_for('school_profile', school_id=school.id) }}'" style="cursor:pointer;">
    <td>{{ school.name }}</td>
    <td>{{ school.location }}</td>
    <td>{{ school.get_school_type_display() }}</td>
    <td>
      <a href="{{ url_for('edit_school', school_id=school.id) }}" class="btn btn-sm btn-primary">Edit</a>
      <a href="{{ url_for('delete_school', school_id=school.id) }}" class="btn btn-danger">Delete</a>
      <span class="float-end">&gt;</span>
    </td>
  </tr>
  {% endfor %}
</table>
{% endblock %}
